<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Guard against libraries trying to overwrite window.fetch
      if (typeof window !== 'undefined' && window.fetch) {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: () => originalFetch,
            set: (v) => {
              console.warn('Attempted to overwrite window.fetch with:', v);
            }
          });
        } catch (e) {
          console.warn('Could not redefine window.fetch:', e);
        }
      }

      // Guard against JSON.parse("undefined") or JSON.parse(undefined)
      const originalParse = JSON.parse;
      JSON.parse = function(text, reviver) {
        if (text === "undefined" || text === undefined) {
          return undefined;
        }
        try {
            return originalParse(text, reviver);
        } catch (e) {
            throw e;
        }
      };

      // Guard against __FIREBASE_DEFAULTS__ being set to "undefined"
      let existingVal = window.__FIREBASE_DEFAULTS__;
      Object.defineProperty(window, '__FIREBASE_DEFAULTS__', {
        configurable: false,
        enumerable: true,
        get: function() {
          return this._firebase_defaults_val;
        },
        set: function(v) {
          if (v === "undefined") {
            console.warn("Blocking __FIREBASE_DEFAULTS__ = 'undefined'");
            this._firebase_defaults_val = null;
          } else {
            this._firebase_defaults_val = v;
          }
        }
      });
      if (existingVal === "undefined") {
          window.__FIREBASE_DEFAULTS__ = null;
      } else {
          window.__FIREBASE_DEFAULTS__ = existingVal;
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
